name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Lint
        run: make lint
      - name: Format check
        run: uv run ruff format --check .

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Run unit tests
        run: make test-unit

  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Run contract tests
        run: make test-contracts

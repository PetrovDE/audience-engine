name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Ruff
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Run unit tests
        run: make test

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.31"
      - name: Install deps
        run: uv sync --group runtime-retrieval-api --group runtime-minimal-slice --group dev --locked
      - name: Run integration smoke tests
        run: make test-integration
